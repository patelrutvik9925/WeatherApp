<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="weatherApp.css">
</head>
<body>

    <div id="message">
        <div id="notification"></div>
    </div>

    <main>

        <section id="weather-card">

            <h1>Weather App</h1>

            <div id="search-container">

                <input
                    type="text"
                    placeholder="Enter City Name"
                    id="city-input"
                >

                <button id="search-btn">
                    Search City
                </button>

            </div>

            <div id="weather-info">

                <h2 id="city-name">
                    City Name
                </h2>

                <p id="weather-description">
                    weather Description
                </p>

                <p id="temperature">
                    temperature
                </p>

                <p id="humidity">
                    Humidity
                </p>

                <p id="wind-speed">
                    Weend Speed
                </p>

            </div>
            
        </section>
    
    </main>

    <script src="weatherApp.js"></script>

</body>
</html>
